spring.application.name=APIGateway

server.port = 8088
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true

#spring.cloud.gateway.routes[0].id=movie-route
#spring.cloud.gateway.routes[0].uri=lb://MSMOVIESDETAILS
#spring.cloud.gateway.routes[0].predicates[0]=Path=/movies*/*

# CART SERVICE
spring.cloud.gateway.routes[0].id=cart-route
spring.cloud.gateway.routes[0].uri=lb://CART-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/carts*/*

# PRODUCT (CATALOG) SERVICE
spring.cloud.gateway.routes[1].id=product-route
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-CATALOG-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/catalogs*/*

# RECOMMENDATION SERVICE
spring.cloud.gateway.routes[2].id=recommendation-route
spring.cloud.gateway.routes[2].uri=lb://RECOMMENDATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/recommendations*/*

# PRICE SERVICE
spring.cloud.gateway.routes[3].id=price-route
spring.cloud.gateway.routes[3].uri=lb://PRICING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/price*/*

# INVENTORY SERVICE
spring.cloud.gateway.routes[4].id=inventory-route
spring.cloud.gateway.routes[4].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/stock*/*